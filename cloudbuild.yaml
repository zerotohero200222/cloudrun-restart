steps:

  # ════════════════════════════════════════════════════════════════
  # PHASE 1 — EXPORT: Snapshot all services to GCS before restart
  # NOTE: $$ means shell variable, $ means Cloud Build substitution
  # ════════════════════════════════════════════════════════════════
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        BUCKET="gs://eighth-physics-489004-b2-tf-state/service-exports"
        echo "=== PHASE 1: Exporting all service configs to GCS ==="
        for SERVICE in cart hello order-service payment; do
          echo "Exporting $$SERVICE ..."
          gcloud run services describe $$SERVICE \
            --region=us-central1 \
            --project=eighth-physics-489004-b2 \
            --format=json > /tmp/$${SERVICE}.json
          gsutil cp /tmp/$${SERVICE}.json $${BUCKET}/$${SERVICE}.json
          echo "✅ $$SERVICE exported"
        done

  # ════════════════════════════════════════════════════════════════
  # PHASE 2 — VERIFY: Confirm all exports exist in bucket
  # ════════════════════════════════════════════════════════════════
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: sh
    args:
      - -c
      - |
        set -e
        BUCKET="gs://eighth-physics-489004-b2-tf-state/service-exports"
        FAILED=0
        echo "=== PHASE 2: Verifying exports in GCS ==="
        for SERVICE in cart hello order-service payment; do
          if gsutil ls $${BUCKET}/$${SERVICE}.json > /dev/null 2>&1; then
            SIZE=$$(gsutil du $${BUCKET}/$${SERVICE}.json | awk '{print $$1}')
            echo "✅ $${SERVICE}.json — $${SIZE} bytes"
          else
            echo "❌ MISSING: $${SERVICE}.json"
            FAILED=1
          fi
        done
        if [ $$FAILED -eq 1 ]; then
          echo "❌ Verification failed — aborting restart"
          exit 1
        fi
        echo "✅ All exports verified — proceeding to restart"

  # ════════════════════════════════════════════════════════════════
  # PHASE 3 — RESTART: Redeploy target service via Terraform
  # ════════════════════════════════════════════════════════════════

  # Step 3a: terraform init
  - name: hashicorp/terraform:1.9
    entrypoint: terraform
    args:
      - init
      - -reconfigure

  # Step 3b: Clear stale lock + remove old service from state
  # terraform state rm prevents destroy+create when switching services
  - name: hashicorp/terraform:1.9
    entrypoint: sh
    args:
      - -c
      - |
        TARGET=$$(grep target_service terraform.tfvars | awk -F'"' '{print $$2}')
        echo "=== PHASE 3: Restarting $$TARGET ==="
        echo "Clearing stale lock (if any)..."
        gsutil rm -f gs://eighth-physics-489004-b2-tf-state/cloudrun-restart/default.tflock || true
        echo "Removing previous service from Terraform state..."
        terraform state rm -lock=false google_cloud_run_service.service || true
        echo "State cleared — Terraform will update $$TARGET in-place"

  # Step 3c: validate
  - name: hashicorp/terraform:1.9
    entrypoint: terraform
    args:
      - validate

  # Step 3d: plan — shows "~ update in-place", never destroy
  - name: hashicorp/terraform:1.9
    entrypoint: terraform
    args:
      - plan
      - -lock=false
      - -var-file=terraform.tfvars
      - -out=tfplan

  # Step 3e: apply — new RESTART_TIMESTAMP → new Cloud Run revision
  - name: hashicorp/terraform:1.9
    entrypoint: terraform
    args:
      - apply
      - -lock=false
      - -auto-approve
      - tfplan

  # ════════════════════════════════════════════════════════════════
  # PHASE 4 — CONFIRM: Print new revision name and URL
  # ════════════════════════════════════════════════════════════════
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: sh
    args:
      - -c
      - |
        TARGET=$$(grep target_service terraform.tfvars | awk -F'"' '{print $$2}')
        echo "=== PHASE 4: Confirming restart of $$TARGET ==="
        gcloud run services describe $$TARGET \
          --region=us-central1 \
          --project=eighth-physics-489004-b2 \
          --format="table(status.latestReadyRevisionName, status.url)"
        echo "✅ Restart complete: $$TARGET"

options:
  logging: CLOUD_LOGGING_ONLY
